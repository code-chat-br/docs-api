services:
  docs:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_SUPPORT_URL: ${NEXT_PUBLIC_SUPPORT_URL:-https://github.com/jrCleber/whatsapp-api-go/issues}
        NEXT_PUBLIC_DOCS_TITLE: ${VITE_DOCS_TITLE:-${NEXT_PUBLIC_DOCS_TITLE:-CodeChat API}}
        NEXT_PUBLIC_DOCS_VERSION: ${VITE_DOCS_VERSION:-${NEXT_PUBLIC_DOCS_VERSION:-1.0.0}}
        NEXT_PUBLIC_OPENAPI_URL: ${VITE_OPENAPI_URL:-${NEXT_PUBLIC_OPENAPI_URL:-/openapi.yml}}
        NEXT_PUBLIC_CODECHAT_API_URL: ${VITE_API_BASE_URL:-${NEXT_PUBLIC_CODECHAT_API_URL:-http://localhost:8084}}
        NEXT_PUBLIC_GITHUB_URL: ${VITE_GITHUB_URL:-${NEXT_PUBLIC_GITHUB_URL:-https://github.com/jrCleber/whatsapp-api-go}}
        NEXT_PUBLIC_POSTMAN_URL: ${VITE_API_POSTMAN:-${NEXT_PUBLIC_POSTMAN_URL:-https://www.postman.com/codechat/codechat-api/collection/1yi47fy/go-v1-0-0}}
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api-reference').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      docs:
        condition: service_healthy
    ports:
      - '${DOCS_PORT:-3000}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1/healthz | grep -q ok']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
