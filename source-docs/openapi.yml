  # Envio em lote persistente
  "/message/batches":
    post:
      tags: ["Message Batches"]
      summary: "Cria um lote persistente"
      description: "Persiste a definição, os destinatários normalizados e as instâncias permitidas. A requisição não envia mensagens; com autoStart=true, o lote já é gravado em QUEUED para consumo assíncrono pelo worker."
      operationId: createMessageBatch
      x-codechat-plan: pro
      x-codechat-plan-enforced: false
      security:
        - GlobalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/CreateMessageBatchRequest"}
      responses:
        "201":
          description: "Lote criado em DRAFT ou QUEUED"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/MessageBatch"}
              example:
                id: "01900000-0000-7000-8000-000000000001"
                name: "Aviso de manutenção"
                status: "DRAFT"
                instances:
                  - {"id":1,"name":"codechat-01","connectionStatus":"offline"}
                  - {"id":2,"name":"codechat-02","connectionStatus":"online"}
                counts: {"received":2,"total":2,"processed":0,"pending":2,"sending":0,"success":0,"failed":0,"skipped":0,"unknown":0}
                progress: 0
                externalAttributes: {"origin":"admin-panel"}
                createdAt: "2026-07-13T15:00:00Z"
                updatedAt: "2026-07-13T15:00:00Z"
        "400": {"$ref":"#/components/responses/MessageBatchBadRequest"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/MessageBatchError"}
        "404": {"$ref":"#/components/responses/MessageBatchError"}
        "422": {"$ref":"#/components/responses/MessageBatchError"}
        "500": {"$ref":"#/components/responses/Error500"}
    get:
      tags: ["Message Batches"]
      summary: "Lista lotes"
      description: "Lista lotes por cursor opaco. nextCursor e previousCursor são mutuamente exclusivos; o limite padrão é 50 e o máximo é 200."
      operationId: listMessageBatches
      x-codechat-plan: pro
      x-codechat-plan-enforced: false
      security:
        - GlobalApiKey: []
      parameters:
        - {"name":"status","in":"query","schema":{"$ref":"#/components/schemas/MessageBatchStatus"}}
        - {"name":"instanceName","in":"query","schema":{"type":"string"}}
        - {"$ref":"#/components/parameters/CreatedFrom"}
        - {"$ref":"#/components/parameters/CreatedTo"}
        - {"name":"query","in":"query","schema":{"type":"string"}}
        - {"$ref":"#/components/parameters/MessageBatchLimit"}
        - {"$ref":"#/components/parameters/NextCursor"}
        - {"$ref":"#/components/parameters/PreviousCursor"}
      responses:
        "200":
          description: "Página de lotes"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/MessageBatchPage"}
        "400": {"$ref":"#/components/responses/MessageBatchBadRequest"}
        "401": {"$ref":"#/components/responses/Error401"}
        "500": {"$ref":"#/components/responses/Error500"}
  "/message/batches/{batchId}":
    get:
      tags: ["Message Batches"]
      summary: "Consulta um lote sem incorporar seus itens"
      description: "Retorna a definição completa do lote, incluindo message e options, mas mantém os itens em recursos paginados separados."
      operationId: getMessageBatch
      x-codechat-plan: pro
      x-codechat-plan-enforced: false
      security:
        - GlobalApiKey: []
      parameters:
        - {"$ref":"#/components/parameters/MessageBatchID"}
      responses:
        "200":
          description: "Detalhes do lote"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/MessageBatch"}
        "400": {"$ref":"#/components/responses/MessageBatchBadRequest"}
        "401": {"$ref":"#/components/responses/Error401"}
        "404": {"$ref":"#/components/responses/MessageBatchError"}
        "500": {"$ref":"#/components/responses/Error500"}
  "/message/batches/{batchId}/items":
    get:
      tags: ["Message Batches"]
      summary: "Lista itens do lote"
      description: "Lista destinatários e resultados por cursor opaco. O cursor de itens é derivado da posição original do destinatário."
      operationId: listMessageBatchItems
      x-codechat-plan: pro
      x-codechat-plan-enforced: false
      security:
        - GlobalApiKey: []
      parameters:
        - {"$ref":"#/components/parameters/MessageBatchID"}
        - {"name":"status","in":"query","schema":{"$ref":"#/components/schemas/MessageBatchItemStatus"}}
        - {"name":"recipient","in":"query","schema":{"type":"string"}}
        - {"name":"instanceName","in":"query","schema":{"type":"string"}}
        - {"$ref":"#/components/parameters/MessageBatchLimit"}
        - {"$ref":"#/components/parameters/NextCursor"}
        - {"$ref":"#/components/parameters/PreviousCursor"}
      responses:
        "200":
          description: "Página de itens"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/MessageBatchItemPage"}
        "400": {"$ref":"#/components/responses/MessageBatchBadRequest"}
        "401": {"$ref":"#/components/responses/Error401"}
        "404": {"$ref":"#/components/responses/MessageBatchError"}
        "500": {"$ref":"#/components/responses/Error500"}
  "/message/batches/{batchId}/items/{itemId}":
    get:
      tags: ["Message Batches"]
      summary: "Consulta item e suas tentativas"
      description: "Retorna um destinatário do lote com o histórico completo de tentativas de envio."
      operationId: getMessageBatchItem
      x-codechat-plan: pro
      x-codechat-plan-enforced: false
      security:
        - GlobalApiKey: []
      parameters:
        - {"$ref":"#/components/parameters/MessageBatchID"}
        - {"$ref":"#/components/parameters/MessageBatchItemID"}
      responses:
        "200":
          description: "Item detalhado"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/MessageBatchItemDetail"}
        "400": {"$ref":"#/components/responses/MessageBatchBadRequest"}
        "401": {"$ref":"#/components/responses/Error401"}
        "404": {"$ref":"#/components/responses/MessageBatchError"}
        "500": {"$ref":"#/components/responses/Error500"}
  "/message/batches/{batchId}/attempts":
    get:
      tags: ["Message Batches"]
      summary: "Lista tentativas do lote"
      description: "Lista tentativas persistidas, incluindo indisponibilidade de instância e resultados UNKNOWN após recovery."
      operationId: listMessageBatchAttempts
      x-codechat-plan: pro
      x-codechat-plan-enforced: false
      security:
        - GlobalApiKey: []
      parameters:
        - {"$ref":"#/components/parameters/MessageBatchID"}
        - {"name":"status","in":"query","schema":{"$ref":"#/components/schemas/MessageBatchAttemptStatus"}}
        - {"name":"recipient","in":"query","schema":{"type":"string"}}
        - {"name":"instanceName","in":"query","schema":{"type":"string"}}
        - {"$ref":"#/components/parameters/MessageBatchLimit"}
        - {"$ref":"#/components/parameters/NextCursor"}
        - {"$ref":"#/components/parameters/PreviousCursor"}
      responses:
        "200":
          description: "Página de tentativas"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/MessageBatchAttemptPage"}
        "400": {"$ref":"#/components/responses/MessageBatchBadRequest"}
        "401": {"$ref":"#/components/responses/Error401"}
        "404": {"$ref":"#/components/responses/MessageBatchError"}
        "500": {"$ref":"#/components/responses/Error500"}
  "/message/batches/{batchId}/start":
    post:
      tags: ["Message Batches"]
      summary: "Inicia ou continua o lote sem executar o loop na requisição"
      description: "Move DRAFT, PAUSED ou INTERRUPTED para QUEUED. É idempotente quando o lote já está QUEUED ou PROCESSING."
      operationId: startMessageBatch
      x-codechat-plan: pro
      x-codechat-plan-enforced: false
      security:
        - GlobalApiKey: []
      parameters:
        - {"$ref":"#/components/parameters/MessageBatchID"}
      responses:
        "200": {"description":"Estado persistido","content":{"application/json":{"schema":{"$ref":"#/components/schemas/MessageBatch"}}}}
        "400": {"$ref":"#/components/responses/MessageBatchBadRequest"}
        "401": {"$ref":"#/components/responses/Error401"}
        "404": {"$ref":"#/components/responses/MessageBatchError"}
        "409": {"$ref":"#/components/responses/MessageBatchError"}
        "500": {"$ref":"#/components/responses/Error500"}
  "/message/batches/{batchId}/pause":
    post:
      tags: ["Message Batches"]
      summary: "Solicita pausa"
      description: "Persiste PAUSE_REQUESTED e retorna imediatamente. O worker conclui o item já confirmado e chega a PAUSED em um ponto seguro."
      operationId: pauseMessageBatch
      x-codechat-plan: pro
      x-codechat-plan-enforced: false
      security:
        - GlobalApiKey: []
      parameters:
        - {"$ref":"#/components/parameters/MessageBatchID"}
      responses:
        "200": {"description":"PAUSE_REQUESTED persistido","content":{"application/json":{"schema":{"$ref":"#/components/schemas/MessageBatch"}}}}
        "400": {"$ref":"#/components/responses/MessageBatchBadRequest"}
        "401": {"$ref":"#/components/responses/Error401"}
        "404": {"$ref":"#/components/responses/MessageBatchError"}
        "409": {"$ref":"#/components/responses/MessageBatchError"}
        "500": {"$ref":"#/components/responses/Error500"}
  "/message/batches/{batchId}/stop":
    post:
      tags: ["Message Batches"]
      summary: "Solicita encerramento terminal"
      description: "Persiste STOP_REQUESTED e retorna imediatamente. STOPPED é terminal e conserva como PENDING os itens não processados."
      operationId: stopMessageBatch
      x-codechat-plan: pro
      x-codechat-plan-enforced: false
      security:
        - GlobalApiKey: []
      parameters:
        - {"$ref":"#/components/parameters/MessageBatchID"}
      responses:
        "200": {"description":"STOP_REQUESTED persistido","content":{"application/json":{"schema":{"$ref":"#/components/schemas/MessageBatch"}}}}
        "400": {"$ref":"#/components/responses/MessageBatchBadRequest"}
        "401": {"$ref":"#/components/responses/Error401"}
        "404": {"$ref":"#/components/responses/MessageBatchError"}
        "409": {"$ref":"#/components/responses/MessageBatchError"}
        "500": {"$ref":"#/components/responses/Error500"}
webhooks:
  messageBatchEvent:
    post:
      tags: ["Message Batches"]
      summary: "Evento global persistente de Message Batch"
      description: "Enviado somente para WEBHOOK_GLOBAL_URL depois do commit da transação do lote. Respostas 2xx confirmam a entrega; falhas são reagendadas pela outbox com backoff persistente."
      operationId: receiveMessageBatchEvent
      x-codechat-plan: pro
      x-codechat-plan-enforced: false
      security: []
      parameters:
        - name: "User-Agent"
          in: header
          required: true
          schema: {"type":"string","const":"CodeChat-MessageBatch-Webhook/1.0"}
        - name: "x-request-id"
          in: header
          required: true
          description: "UUID de rastreio da tentativa HTTP; não é uma chave de idempotência."
          schema: {"type":"string","format":"uuid"}
        - name: "x-webhook-event"
          in: header
          required: true
          description: "Mesmo valor do campo event no body."
          schema: {"$ref":"#/components/schemas/MessageBatchWebhookEvent"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/MessageBatchWebhookEnvelope"}
            examples:
              progress:
                summary: "Progresso do lote"
                value:
                  event: "message.batch.progress"
                  timestamp: "2026-07-13T15:10:00Z"
                  data:
                    batch:
                      id: "01900000-0000-7000-8000-000000000001"
                      name: "Aviso de manutenção"
                      status: "PROCESSING"
                      instances:
                        - {"id":1,"name":"codechat-01","connectionStatus":"online","selectedCount":20}
                      counts: {"total":100,"processed":35,"pending":64,"sending":1,"success":33,"failed":2,"skipped":0,"unknown":0}
                      progress: 35
                      currentItem: {"id":"01900000-0000-7000-8000-000000000036","position":35,"recipient":"5531999999999","instanceName":"codechat-01"}
                      createdAt: "2026-07-13T15:00:00Z"
                      startedAt: "2026-07-13T15:01:00Z"
                      updatedAt: "2026-07-13T15:10:00Z"
              itemFailed:
                summary: "Falha definitiva de um item"
                value:
                  event: "message.batch.item.failed"
                  timestamp: "2026-07-13T15:12:00Z"
                  data:
                    batchId: "01900000-0000-7000-8000-000000000001"
                    itemId: "01900000-0000-7000-8000-000000000037"
                    recipient: "5531888888888"
                    instance: {"id":2,"name":"codechat-02"}
                    error: {"code":"SEND_MESSAGE_FAILED","message":"falha ao enviar a mensagem"}
      responses:
        "2XX":
          description: "Evento aceito pelo consumidor."
components:
  securitySchemes:
    GlobalApiKey:
      type: apiKey
      in: header
      name: apikey
      description: "Token global. O runtime também aceita x-api-key e apiKey; aliases simultâneos precisam ter o mesmo valor."
    InstanceBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT HS256 da própria instância."
  parameters:
    Instance: {"name":"instance","in":"path","required":true,"description":"Nome público da instância","schema":{"type":"string","minLength":1}}
    LegacyInstanceName: {"name":"instanceName","in":"path","required":true,"description":"Nome público da instância na rota legada ou no segundo segmento de logout","schema":{"type":"string","minLength":1}}
    PhoneNumber: {"name":"phoneNumber","in":"path","required":true,"description":"Telefone; o servidor normaliza para dígitos","schema":{"type":"string","minLength":1}}
    InteractiveType: {"name":"type","in":"path","required":true,"description":"Tipo interativo confirmado no código","schema":{"type":"string","enum":["reply","copy","url","buttons","carousel"]}}
    MediaUploadID: {"name":"id","in":"path","required":true,"description":"ID positivo do upload antecipado","schema":{"type":"integer","minimum":1}}
    InstanceFilter: {"name":"instanceName","in":"query","required":false,"description":"Filtro opcional, não vazio, máximo 255","schema":{"type":"string","minLength":1,"maxLength":255}}
    Force: {"name":"force","in":"query","required":false,"description":"Força exclusão de dependências","schema":{"type":"boolean","default":false}}
    MessageID: {"name":"id","in":"query","required":true,"description":"ID interno positivo da mensagem","schema":{"type":"integer","minimum":1}}
    Binary: {"name":"binary","in":"query","required":false,"description":"Retorna binário bruto quando true","schema":{"type":"boolean","default":false}}
    GroupJID: {"name":"groupJid","in":"query","required":true,"description":"JID do grupo","schema":{"type":"string","pattern":"@g\\.us$"}}
    ExternalID: {"name":"externalId","in":"query","required":false,"schema":{"type":"string","maxLength":255}}
    MediaTypeFilter: {"name":"mediaType","in":"query","required":false,"schema":{"type":"string","enum":["image","video","audio","document"]}}
    Expired: {"name":"expired","in":"query","required":false,"schema":{"type":"boolean"}}
    CreatedFrom: {"name":"createdFrom","in":"query","required":false,"schema":{"type":"string","format":"date-time"}}
    CreatedTo: {"name":"createdTo","in":"query","required":false,"schema":{"type":"string","format":"date-time"}}
    Limit: {"name":"limit","in":"query","required":false,"schema":{"type":"integer","default":20,"maximum":100}}
    Cursor: {"name":"cursor","in":"query","required":false,"schema":{"type":"integer","minimum":1}}
    MessageBatchID: {"name":"batchId","in":"path","required":true,"schema":{"type":"string","format":"uuid"}}
    MessageBatchItemID: {"name":"itemId","in":"path","required":true,"schema":{"type":"string","format":"uuid"}}
    MessageBatchLimit: {"name":"limit","in":"query","required":false,"schema":{"type":"integer","default":50,"minimum":1,"maximum":200}}
