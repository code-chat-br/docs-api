openapi: 3.1.0
info:
  title: "CodeChat API Go"
  version: "1.0.0"
  description: "Contrato source-first das rotas atuais, dos recursos classificados como CodeChat API Go Pro e dos aliases legados ainda registrados. A classificação Pro não é aplicada pelo runtime auditado."
  license:
    name: "GNU Affero General Public License v3.0 only"
    identifier: "AGPL-3.0-only"
servers:
  - url: "http://{host}:{port}"
    description: "Servidor configurável; os defaults representam a execução local."
    variables:
      host:
        default: "localhost"
      port:
        default: "8084"
tags:
  - name: "System"
    description: "Saúde e prontidão."
  - name: "Instances"
    description: "Contrato atual de instâncias."
  - name: "Connections"
    description: "Contrato atual de conexão, pairing e logout."
  - name: "Messages"
    description: "Mensagens comuns atuais."
  - name: "Message Batches"
    description: "Recurso CodeChat API Go Pro: fila PostgreSQL persistente para envio assíncrono a contatos individuais, administrada exclusivamente pelo token global. A classificação Pro não é aplicada pelo runtime atual."
  - name: "Chats"
    description: "Operações atuais de chat."
  - name: "Media"
    description: "Download e upload antecipado de mídia."
  - name: "Groups"
    description: "Operações atuais de grupo."
  - name: "Webhooks"
    description: "Configuração atual de webhook por instância."
  - name: "CodeChat API Go Pro"
    description: "Classificação comercial. O runtime atual não aplica entitlement nem retorna 402."
  - name: "Legacy - Instances"
    description: "Aliases antigos de instância ainda ativos."
  - name: "Legacy - Connections"
    description: "Aliases antigos de conexão ainda ativos."
  - name: "Legacy - Messages"
    description: "Aliases antigos de mensagem ainda ativos."
  - name: "Legacy - Chats"
    description: "Aliases antigos de chat e mídia ainda ativos."
  - name: "Legacy - Groups"
    description: "Aliases antigos de grupo ainda ativos."
  - name: "Legacy - Webhooks"
    description: "Aliases antigos de webhook ainda ativos."
paths:
  # Endpoints atuais - sistema
  "/health":
    get:
      tags: ["System"]
      summary: "Verifica se o processo está ativo"
      operationId: getHealth
      security: []
      responses:
        "200":
          description: "Processo ativo"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/HealthResponse"}
  "/ready":
    get:
      tags: ["System"]
      summary: "Verifica dependências necessárias para receber tráfego"
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: "Aplicação pronta"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/ReadyResponse"}
        "503": {"$ref":"#/components/responses/Error503"}
  # Endpoints atuais - instâncias
  "/instance":
    post:
      tags: ["Instances"]
      summary: "Cria uma instância"
      operationId: createInstance
      security:
        - GlobalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/CreateInstanceRequest"}
      responses:
        "201":
          description: "Instância criada"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/CreateInstanceResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "409": {"$ref":"#/components/responses/Error409"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
    get:
      tags: ["Instances"]
      summary: "Lista instâncias"
      operationId: listInstances
      security:
        - GlobalApiKey: []
      parameters:
        - {"$ref":"#/components/parameters/InstanceFilter"}
      responses:
        "200":
          description: "Lista de instâncias"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/InstanceListResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}":
    get:
      tags: ["Instances"]
      summary: "Consulta uma instância"
      operationId: getInstance
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      responses:
        "200":
          description: "Instância encontrada"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/InstanceResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
    delete:
      tags: ["Instances"]
      summary: "Exclui uma instância"
      operationId: deleteInstance
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
        - {"$ref":"#/components/parameters/Force"}
      responses:
        "200":
          description: "Resultado da exclusão"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/DeleteInstanceResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  # Endpoints atuais - conexões
  "/instance/{instance}/connection/status":
    get:
      tags: ["Connections"]
      summary: "Consulta o estado da conexão"
      operationId: getConnectionStatus
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      responses:
        "200":
          description: "Estado da conexão"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/ConnectionStatusResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "409": {"$ref":"#/components/responses/Error409"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/connect":
    get:
      tags: ["Connections"]
      summary: "Inicia ou acompanha conexão por QR Code"
      operationId: connectInstanceByQrGet
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      responses:
        "200":
          description: "QR Code ou estado atual"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/QRCodeResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "409": {"$ref":"#/components/responses/Error409"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
    post:
      tags: ["Connections"]
      summary: "Inicia ou acompanha conexão por QR Code"
      operationId: connectInstanceByQrPost
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      responses:
        "200":
          description: "QR Code ou estado atual"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/QRCodeResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "409": {"$ref":"#/components/responses/Error409"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/connect/code/{phoneNumber}":
    get:
      tags: ["Connections"]
      summary: "Solicita pairing code pelo path"
      operationId: connectInstanceByPairingCodePath
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
        - {"$ref":"#/components/parameters/PhoneNumber"}
      responses:
        "200":
          description: "Código de pareamento"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/PairingCodeResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "409": {"$ref":"#/components/responses/Error409"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/connect/code":
    post:
      tags: ["Connections"]
      summary: "Solicita pairing code pelo body"
      operationId: connectInstanceByPairingCodeBody
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/PairingCodeRequest"}
      responses:
        "200":
          description: "Código de pareamento"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/PairingCodeResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "409": {"$ref":"#/components/responses/Error409"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/connect/passkey/challenge":
    post:
      tags: ["Connections"]
      summary: "Obtém challenge WebAuthn"
      operationId: createPasskeyChallenge
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      responses:
        "200":
          description: "Challenge disponível"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/PasskeyChallengeResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "409": {"$ref":"#/components/responses/Error409"}
        "410": {"$ref":"#/components/responses/Error410"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/connect/passkey/assertion":
    post:
      tags: ["Connections"]
      summary: "Envia assertion WebAuthn"
      operationId: submitPasskeyAssertion
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/PasskeyAssertionRequest"}
      responses:
        "202":
          description: "Assertion aceita"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/PasskeyAcceptedResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "409": {"$ref":"#/components/responses/Error409"}
        "410": {"$ref":"#/components/responses/Error410"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/logout/{instanceName}":
    delete:
      tags: ["Connections"]
      summary: "Desconecta a sessão WhatsApp"
      operationId: logoutInstance
      description: "A rota possui dois nomes de instância. O middleware e o handler preferem {instanceName}; envie o mesmo valor nos dois segmentos."
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
        - {"$ref":"#/components/parameters/LegacyInstanceName"}
      responses:
        "200":
          description: "Sessão desconectada"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/LogoutResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "409": {"$ref":"#/components/responses/Error409"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  # Endpoints atuais - chats
  "/instance/{instance}/chat/is-account":
    post:
      tags: ["Chats"]
      summary: "Verifica números cadastrados no WhatsApp"
      operationId: checkWhatsAppAccounts
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/IsAccountRequest"}
      responses:
        "200":
          description: "Resultado por número"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/IsAccountResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/chat/read-message":
    patch:
      tags: ["Chats"]
      summary: "Marca mensagens como lidas"
      operationId: markMessagesRead
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/ReadMessagesRequest"}
      responses:
        "200":
          description: "Mensagens marcadas"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/ReadMessagesResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/chat/archive":
    put:
      tags: ["Chats"]
      summary: "Arquiva ou desarquiva uma conversa"
      operationId: archiveChat
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/ArchiveChatRequest"}
      responses:
        "204":
          description: "Conversa atualizada"
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/chat/delete-message":
    delete:
      tags: ["Chats"]
      summary: "Exclui uma mensagem"
      operationId: deleteChatMessage
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
        - {"$ref":"#/components/parameters/MessageID"}
      responses:
        "204":
          description: "Mensagem excluída"
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/chat/profile-picture":
    post:
      tags: ["Chats"]
      summary: "Consulta foto de perfil"
      operationId: getProfilePicture
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/RecipientRequest"}
      responses:
        "200":
          description: "URL da foto ou null"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/ProfilePictureResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/chat/reject-call":
    post:
      tags: ["Chats"]
      summary: "Rejeita uma chamada"
      operationId: rejectCall
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/RejectCallRequest"}
      responses:
        "204":
          description: "Chamada rejeitada"
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/chat/edit-message":
    post:
      tags: ["Chats"]
      summary: "Edita uma mensagem enviada"
      operationId: editMessage
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/EditMessageRequest"}
      responses:
        "200":
          description: "Mensagem editada"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/Message"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "408": {"$ref":"#/components/responses/Error408"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  # Endpoints atuais - mensagens
  "/instance/{instance}/send/text":
    post:
      tags: ["Messages"]
      summary: "Envia texto"
      operationId: sendTextMessage
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/SendTextRequest"}
      responses:
        "200":
          description: "Mensagem enviada"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/Message"}
        "202":
          description: "Envio assíncrono aceito"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/AcceptedResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "406": {"$ref":"#/components/responses/Error406"}
        "408": {"$ref":"#/components/responses/Error408"}
        "413": {"$ref":"#/components/responses/Error413"}
        "415": {"$ref":"#/components/responses/Error415"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/send/link":
    post:
      tags: ["Messages"]
      summary: "Envia link"
      operationId: sendLinkMessage
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/SendLinkRequest"}
      responses:
        "200":
          description: "Mensagem enviada"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/Message"}
        "202":
          description: "Envio assíncrono aceito"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/AcceptedResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
        "401": {"$ref":"#/components/responses/Error401"}
        "403": {"$ref":"#/components/responses/Error403"}
        "404": {"$ref":"#/components/responses/Error404"}
        "406": {"$ref":"#/components/responses/Error406"}
        "408": {"$ref":"#/components/responses/Error408"}
        "413": {"$ref":"#/components/responses/Error413"}
        "415": {"$ref":"#/components/responses/Error415"}
        "422": {"$ref":"#/components/responses/Error422"}
        "500": {"$ref":"#/components/responses/Error500"}
        "503": {"$ref":"#/components/responses/Error503"}
  "/instance/{instance}/send/media":
    post:
      tags: ["Messages"]
      summary: "Envia mídia por URL ou upload antecipado"
      operationId: sendMediaMessage
      security:
        - InstanceBearer: []
      parameters:
        - {"$ref":"#/components/parameters/Instance"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {"$ref":"#/components/schemas/SendMediaRequest"}
      responses:
        "200":
          description: "Mensagem enviada"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/Message"}
        "202":
          description: "Envio assíncrono aceito"
          content:
            application/json:
              schema: {"$ref":"#/components/schemas/AcceptedResponse"}
        "400": {"$ref":"#/components/responses/Error400"}
