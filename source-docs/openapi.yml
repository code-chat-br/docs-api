    MessageBatchMessage: {"type":"object","properties":{"type":{"type":"string","enum":["text","link","media","audio","ptt","whatsapp-audio","whatsapp_audio","contact","location","interactive"]},"payload":{"description":"Para type=interactive, segue MessageBatchInteractivePayload; os demais tipos reutilizam o payload interno do endpoint individual.","oneOf":[{"type":"object","additionalProperties":true},{"type":"array","items":{"type":"object","additionalProperties":true}}]}},"required":["type","payload"],"additionalProperties":false}
